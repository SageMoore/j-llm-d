apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-decode
  labels:
    llm-d.ai/inferenceServing: "true"
    llm-d.ai/model: Qwen3-235B-A22B-Instruct-2507-FP8
    llm-d.ai/role: decode
spec:
  replicas: 1
  rolloutStrategy:
    type: RollingUpdate
    rollingUpdateConfiguration:
      maxUnavailable: 100%
  leaderWorkerTemplate:
    size: 2
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/deploy-ts: DEPLOY_TS_PLACEHOLDER
          llm-d.ai/inferenceServing: "true"
          llm-d.ai/model: Qwen3-235B-A22B-Instruct-2507-FP8
          llm-d.ai/owner: OWNER_PLACEHOLDER
          llm-d.ai/role: decode
      spec:
        serviceAccountName: wide-ep
        imagePullSecrets:
          - name: quay-pull-secret
        terminationGracePeriodSeconds: 0
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                  - key: node.coreweave.cloud/physical-topology.grid-group
                    operator: In
                    values:
                      - "F"
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: local-nvme
            hostPath:
              path: /mnt/local
              type: Directory
        initContainers:
          # Sidecar image from https://github.com/llm-d/llm-d-inference-scheduler/pull/746
          # (hot-path perf optimizations: connection pooling, LRU cache, alloc reduction)
          - name: routing-proxy-rank0
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8000
              - --vllm-port=8200
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8000
                name: proxy-rank0
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank1
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8001
              - --vllm-port=8201
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8001
                name: proxy-rank1
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank2
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8002
              - --vllm-port=8202
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8002
                name: proxy-rank2
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank3
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8003
              - --vllm-port=8203
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8003
                name: proxy-rank3
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank4
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8004
              - --vllm-port=8204
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8004
                name: proxy-rank4
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank5
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8005
              - --vllm-port=8205
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8005
                name: proxy-rank5
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank6
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8006
              - --vllm-port=8206
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8006
                name: proxy-rank6
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank7
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8007
              - --vllm-port=8207
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8007
                name: proxy-rank7
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
        containers:
          - name: vllm
            image: VLLM_IMAGE_PLACEHOLDER
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                set -euo pipefail
                LOG_DIR=/mnt/local/logs/decode
                mkdir -p "$LOG_DIR"
                LOG_FILE="$LOG_DIR/${HOSTNAME}_$(date +%Y%m%d-%H%M%S).log"
                exec > >(tee -a "$LOG_FILE") 2>&1
                echo "=== Pod $HOSTNAME started at $(date -Iseconds) ==="

                FORK_REPO="FORK_REPO_PLACEHOLDER"
                FORK_BRANCH="FORK_BRANCH_PLACEHOLDER"
                if [ -n "$FORK_BRANCH" ]; then
                  cd /opt/vllm-source
                  git remote add fork "$FORK_REPO" 2>/dev/null || git remote set-url fork "$FORK_REPO"
                  git fetch fork "$FORK_BRANCH"
                  git checkout "fork/$FORK_BRANCH"
                  echo "=== Checked out fork/$FORK_BRANCH at $(date) ==="
                  cd -
                fi

                # DEV mode: use persistent Lustre venv; otherwise use system vllm
                if [ -n "${VLLM_DEV_VENV}" ] && [ -d "${VLLM_DEV_VENV}" ]; then
                  echo "Using dev venv at ${VLLM_DEV_VENV}"
                  source "${VLLM_DEV_VENV}/bin/activate"
                fi

                if ! command -v cuobjdump &>/dev/null; then
                  timeout 120 apt-get update && timeout 120 apt-get install -y 'cuda-cuobjdump-*' \
                    || echo "WARN: cuobjdump install failed, continuing"
                fi

                uv pip install --system --upgrade transformers

                # Derive batch-size-dependent env vars from MAX_TOKENS
                export VLLM_MOE_DP_CHUNK_SIZE=$MAX_TOKENS
                # NVSHMEM_QP_DEPTH only needed for DeepEP
                export NVSHMEM_QP_DEPTH=$(((MAX_TOKENS + 16) * 2))

                DP_SIZE_LOCAL=$((8 / TP_SIZE))
                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                PROFILER_ARGS=""
                NSYS_PREFIX=""
                NVTX_TRACING_ARG=""
                if [ "${ENABLE_PROFILING:-0}" = "1" ]; then
                  echo "Profiling enabled, installing profiling tools..."
                  uv pip install nvtx
                  mkdir -p /trace
                  apt-get update && apt-get install -y --no-install-recommends nsight-systems-cli 2>/dev/null || \
                  uv pip install nvidia-nsight-systems 2>/dev/null || \
                  (echo "ERROR: Could not install nsys. Add nsight-systems to your container image." && exit 1)

                  if [ "${PROFILER_TYPE:-nsys}" = "nsys" ]; then
                    NSYS_PREFIX="nsys profile --cuda-graph-trace=graph --trace=cuda,nvtx --delay=${PROFILER_DELAY_SECS:-120} --duration=${PROFILER_DURATION_SECS:-10} -o /trace/decode_rank_${START_RANK}"
                    NVTX_TRACING_ARG="--enable-layerwise-nvtx-tracing"
                  else
                    PROFILER_ARGS="--profiler-config {\"profiler\":\"torch\",\"max_iterations\":${PROFILER_MAX_ITERS:-32},\"torch_profiler_dir\":\"/trace\"}"
                  fi
                fi

                for R in $(seq 0 $((DP_SIZE_LOCAL - 1))); do
                  GPU_START=$((R * TP_SIZE))
                  GPUS=$(seq -s, $GPU_START $((GPU_START + TP_SIZE - 1)))

                  VLLM_CACHE_ROOT=${VLLM_CACHE_ROOT}/rank$R \
                  FLASHINFER_CACHE_DIR=${FLASHINFER_CACHE_DIR}/rank$R \
                  CUDA_VISIBLE_DEVICES=$GPUS $NSYS_PREFIX vllm serve $PROFILER_ARGS \
                    Qwen/Qwen3-235B-A22B-Instruct-2507-FP8 \
                    --disable-uvicorn-access-log \
                    --max-model-len 4096 \
                    --port $((8200 + R)) \
                    --tensor-parallel-size $TP_SIZE \
                    --enable-expert-parallel \
                    --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                    --data-parallel-rank $((START_RANK + R)) \
                    --data-parallel-size-local 1 \
                    --data-parallel-address ${LWS_LEADER_ADDRESS} \
                    --data-parallel-rpc-port 5555 \
                    --trust-remote-code \
                    --kv_transfer_config "$KV_TRANSFER_CONFIG" \
                    --gpu-memory-utilization 0.9 \
                    --max-num-batched-tokens $MAX_TOKENS \
                    --max-num-seqs $MAX_TOKENS \
                    --disable_cascade_attn \
                    --max-cudagraph-capture-size $MAX_TOKENS \
                    --all2all-backend "deepep_low_latency" \
                    --async-scheduling \
                    --api-server-count 8 \
                    --enable-eplb \
                    --eplb-config '{"window_size":"100",
                                    "step_interval":"3000",
                                    "num_redundant_experts":"0",
                                    "log_balancedness":"True",
                                    "log_balancedness_interval":"1000"}' \
                    --kv-cache-dtype fp8 \
                    --enable-force-include-usage &
                done

                    #--all2all-backend "deepep_low_latency" \
                    ########
                    # TODO: try
                    #--speculative-config '{"method":"mtp","num_speculative_tokens":1}' \
                    #--compilation_config '{"cudagraph_mode": "FULL_AND_PIECEWISE"}' \
                    ########
                    
                    # --attention_backend "CUTLASS_MLA" \
                    #--profiler-config '{"profiler": "torch",
                    #                    "torch_profiler_dir": "/traces",
                    #                    "ignore_frontend": "true",
                    #                    "delay_iterations": 5,
                    #                    "max_iterations": 3}' \
                    #
                    #

                # If any process exits, kill all and restart pod
                wait -n
                kill $(jobs -p) 2>/dev/null
                exit 1

            env:
              - name: VLLM_NO_USAGE_STATS
                value: "1"
              - name: TQDM_DISABLE
                value: "1"

              # Set to a Lustre venv path to override baked-in vLLM (e.g. LUSTRE_PREFIX_PLACEHOLDER/vllm-venv)
              - name: VLLM_DEV_VENV
                value: VLLM_DEV_VENV_PLACEHOLDER

              # DeepEP low-latency only: NVFP4 dispatch + masked_gemm
              #- name: VLLM_DEEPEPLL_NVFP4_DISPATCH
              #  value: "1"
              #- name: VLLM_FLASHINFER_MOE_BACKEND
              #  value: "masked_gemm"

              - name: MAX_TOKENS
                value: "1024"

              # Enable on-demand profiling via /start_profile and /stop_profile
              - name: VLLM_TORCH_PROFILER_DIR
                value: "/traces"

              # HuggingFace token and cache location
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-secret
                    key: HF_TOKEN
                    optional: true
              - name: HF_HOME
                value: /mnt/local/hf_cache

              # Compile caches
              - name: VLLM_CACHE_ROOT
                value: /mnt/local/vllm_cache
              - name: FLASHINFER_CACHE_DIR
                value: /mnt/local/flashinfer_cache

              # Tensor parallelism - GPUs per DP rank (DP_SIZE_LOCAL = 4 / TP_SIZE)
              - name: TP_SIZE
                value: "1"

              - name: VLLM_DEEPEP_LOW_LATENCY_USE_MNNVL
                value: "0"

              # Common vLLM settings
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled

              # NVSHMEM config (DeepEP only, not needed for flashinfer_moe_a2a)
              - name: NVSHMEM_DISABLE_CUDA_VMM
                value: "0"
              - name: NVSHMEM_HCA_PREFIX
                value: ibp
              # - name: NVSHMEM_SYMMETRIC_SIZE
              #   value: "16G"
              # - name: NVSHMEM_DEBUG
              #   value: "INFO"
              # - name: NVSHMEM_DEBUG_SUBSYS
              #   value: "ALL"
              # - name: NCCL_DEBUG
              #   value: "INFO"
              - name: NCCL_NVLS_ENABLE
                value: "0"

              # UCX configuration for NIXL
              - name: UCX_NET_DEVICES
                value: "ibp0:1,ibp1:1,ibp2:1,ibp3:1,ibp4:1,ibp5:1,ibp6:1,ibp7:1"
              # Point UCX at NIXL's bundled transport plugins (auditwheel-relocated)
              - name: UCX_MODULE_DIR
                value: /usr/local/lib/python3.12/dist-packages/nixl_cu12.libs/ucx
              - name: UCX_TLS
                value: "rc,cuda_copy,cuda_ipc,gdr_copy"
              - name: UCX_MEMTYPE_CACHE
                value: "n"

              # Engine startup timeout (default 600s, increase for large models over network storage)
              - name: VLLM_ENGINE_READY_TIMEOUT_S
                value: "1800"

              # Debug logging
              - name: VLLM_LOGGING_LEVEL
                value: INFO
              #- name: NCCL_DEBUG
              #  value: "TRACE"
              #- name: NVSHMEM_DEBUG
              #  value: INFO

              # KV_TRANSFER_CONFIG and VLLM_NIXL_SIDE_CHANNEL_HOST are
              # added by overlays (pd vs decode-bench use different connectors)
            ports:
              - containerPort: 8200
                name: vllm-rank0
                protocol: TCP
              - containerPort: 8201
                name: vllm-rank1
                protocol: TCP
              - containerPort: 8202
                name: vllm-rank2
                protocol: TCP
              - containerPort: 8203
                name: vllm-rank3
                protocol: TCP
              - containerPort: 8204
                name: vllm-rank4
                protocol: TCP
              - containerPort: 8205
                name: vllm-rank5
                protocol: TCP
              - containerPort: 8206
                name: vllm-rank6
                protocol: TCP
              - containerPort: 8207
                name: vllm-rank7
                protocol: TCP
            readinessProbe:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    for port in 8000 8001 8002 8003 8004 8005 8006 8007; do
                      curl -sf http://localhost:$port/v1/models | grep -q '"id"' || exit 1
                    done
              periodSeconds: 5
              failureThreshold: 60
            resources:
              limits:
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "8"
                rdma/ib: "1"
              requests:
                cpu: 32
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "8"
                rdma/ib: "1"
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /mnt/local
                name: local-nvme
            workingDir: /code
